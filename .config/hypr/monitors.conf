# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
# env = GDK_SCALE,2
# monitor=,preferred,auto,auto

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.666667

# Straight 1x setup for low-resolution displays like 1080p or 1440p
env = GDK_SCALE,1

# Laptop display (primary)
monitor=eDP-1,1920x1080@120,0x0,1

# External monitors - Persistent identification using desc: instead of dynamic ports
# Samsung LS24DG30X (180Hz) - Main external monitor, positioned to the right of laptop
monitor=desc:Samsung Electric Company LS24DG30X H8AY300239,1920x1080@180,1920x0,1

# Samsung S24F350 (60Hz) - Mirror of laptop display
monitor=desc:Samsung Electric Company S24F350 H4ZJA00367,1920x1080@60,auto,1,mirror,eDP-1
monitor=desc:Samsung Electric Company S24F350 H4ZJA00367,addreserved,0,0,0,30
# monitor=desc:Samsung Electric Company S24F350 H4ZJA00367,1080x1920@60,auto,1,transform,3,mirror,eDP-1

# Workspace assignment: odd workspaces on laptop, even on external monitor
workspace=1,monitor:eDP-1,default:true

# Even workspaces on Samsung LS24DG30X (180Hz monitor)
workspace=2,monitor:desc:Samsung Electric Company LS24DG30X H8AY300239,default:true

workspace=3,monitor:eDP-1

workspace=4,monitor:desc:Samsung Electric Company LS24DG30X H8AY300239

workspace=5,monitor:eDP-1

workspace=6,monitor:desc:Samsung Electric Company LS24DG30X H8AY300239

workspace=7,monitor:eDP-1

workspace=8,monitor:desc:Samsung Electric Company LS24DG30X H8AY300239

workspace=9,monitor:eDP-1

workspace=10,monitor:desc:Samsung Electric Company LS24DG30X H8AY300239

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2
