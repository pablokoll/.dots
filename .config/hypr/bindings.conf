# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
$terminal = uwsm-app -- ghostty
$browser = omarchy-launch-browser

bindd = SUPER, RETURN, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private
# Removed SUPER SHIFT M (Music) - Omarchy now uses SUPER CTRL A for audio controls
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus "^obsidian$" "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu


# Custom workspace pair switching (switches both odd and even workspaces together)
bindd = SUPER CTRL, code:10, Switch to workspace pair 1-2, exec, ~/.config/hypr/scripts/workspace-pair.sh 1
bindd = SUPER CTRL, code:11, Switch to workspace pair 1-2, exec, ~/.config/hypr/scripts/workspace-pair.sh 2
bindd = SUPER CTRL, code:12, Switch to workspace pair 3-4, exec, ~/.config/hypr/scripts/workspace-pair.sh 3
bindd = SUPER CTRL, code:13, Switch to workspace pair 3-4, exec, ~/.config/hypr/scripts/workspace-pair.sh 4
bindd = SUPER CTRL, code:14, Switch to workspace pair 5-6, exec, ~/.config/hypr/scripts/workspace-pair.sh 5
bindd = SUPER CTRL, code:15, Switch to workspace pair 5-6, exec, ~/.config/hypr/scripts/workspace-pair.sh 6
bindd = SUPER CTRL, code:16, Switch to workspace pair 7-8, exec, ~/.config/hypr/scripts/workspace-pair.sh 7
bindd = SUPER CTRL, code:17, Switch to workspace pair 7-8, exec, ~/.config/hypr/scripts/workspace-pair.sh 8
bindd = SUPER CTRL, code:18, Switch to workspace pair 9-10, exec, ~/.config/hypr/scripts/workspace-pair.sh 9
bindd = SUPER CTRL, code:19, Switch to workspace pair 9-10, exec, ~/.config/hypr/scripts/workspace-pair.sh 10

bindd = SUPER, code:19, Switch to workspace 10, workspace, 10 
bindd = SUPER SHIFT, code:19,Move window to workspace 10, movetoworkspace, 10 

# My custom key bindings
bindd = SUPER SHIFT, R, Refresh external monitors, exec, hyprctl keyword monitor "desc:Samsung Electric Company LS24DG30X H8AY300239,disable" && hyprctl keyword monitor "desc:Samsung Electric Company S24F350 H4ZJA00367,disable" && sleep 1 && hyprctl keyword monitor "desc:Samsung Electric Company LS24DG30X H8AY300239,1920x1080@180,1920x0,1" && hyprctl keyword monitor "desc:Samsung Electric Company S24F350 H4ZJA00367,1920x1080@60,auto,1,mirror,eDP-1"
bindd = SUPER SHIFT, S, Screenshot to file + clipboard, exec, omarchy-cmd-screenshot smart

# Override Omarchy defaults - unbind first, then reassign SUPER+J and SUPER+K
unbind = SUPER, J
unbind = SUPER, K
bindd = CTRL ALT, J, Toggle window split, togglesplit
bindd = CTRL ALT, K, Show key bindings, exec, omarchy-menu-keybindings

# Preselect split direction for next window (SUPER + CTRL + vim keys)
bindd = SUPER CTRL, H, Preselect split left, layoutmsg, preselect l
bindd = SUPER CTRL, J, Preselect split down, layoutmsg, preselect d
bindd = SUPER CTRL, K, Preselect split up, layoutmsg, preselect u
bindd = SUPER CTRL, L, Preselect split right, layoutmsg, preselect r

unbind = SUPER, L
# Move focus with SUPER + vim keys
bindd = SUPER, H, Move window focus left, movefocus, l
bindd = SUPER, J, Move window focus down, movefocus, d
bindd = SUPER, K, Move window focus up, movefocus, u
bindd = SUPER, L, Move window focus right, movefocus, r

# Swap windows with SUPER + SHIFT + vim keys
bindd = SUPER SHIFT, H, Swap window left, swapwindow, l
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, L, Swap window right, swapwindow, r

# Move window to group with SUPER + ALT + vim keys
bindd = SUPER ALT, H, Move window to group on left, moveintogroup, l
bindd = SUPER ALT, J, Move window to group on bottom, moveintogroup, d
bindd = SUPER ALT, K, Move window to group on top, moveintogroup, u
bindd = SUPER ALT, L, Move window to group on right, moveintogroup, r

# Override lock screen binding from SUPER CTRL L to SUPER CTRL ALT L
unbind = SUPER CTRL, L
bindd = SUPER CTRL ALT, L, Lock system, exec, omarchy-lock-screen

# Navigate between tabs in group with SUPER + SHIFT + ALT + H/L
bindd = SUPER CTRL, H, Switch to previous tab in group, changegroupactive, b
bindd = SUPER CTRL, L, Switch to next tab in group, changegroupactive, f

# Reorder windows within group with SUPER + CTRL + ALT + H/L
bindd = SUPER SHIFT CTRL, H, Move group window backward, movegroupwindow, b
bindd = SUPER SHIFT CTRL, L, Move group window forward, movegroupwindow, f

# Lock/unlock active group with SUPER + ALT + B
bindd = SUPER ALT, B, Lock/unlock active group, lockactivegroup, toggle

# Kill window mode - Ctrl+Shift+Alt+K to activate, click to kill, ESC to cancel
bindd = CTRL SHIFT ALT, K, Kill window mode (click to kill), exec, ~/.config/hypr/scripts/kill-mode.sh activate

# Submap for kill mode
submap = kill
bind = , mouse:272, exec, ~/.config/hypr/scripts/kill-mode.sh kill        # Left click - clean close
bind = , mouse:273, exec, ~/.config/hypr/scripts/kill-mode.sh force-kill  # Right click - force kill -9
bind = , ESCAPE, exec, ~/.config/hypr/scripts/kill-mode.sh cancel
submap = reset

# Toggle workspace layout (dwindle <-> scrolling)
bindd = SUPER SHIFT ALT, L, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle

# Workspace configuration switching
bindd = SUPER CTRL SHIFT ALT, P, All workspaces to primary monitor, exec, ~/.config/hypr/scripts/workspaces-to-primary.sh
bindd = SUPER CTRL SHIFT ALT, S, Standard workspace configuration, exec, ~/.config/hypr/scripts/workspaces-to-standard.sh

# Numpad workspace switching (mirrors SUPER + 1-0)
bindd = SUPER, KP_End,    Switch to workspace 1 (numpad),  workspace, 1
bindd = SUPER, KP_Down,   Switch to workspace 2 (numpad),  workspace, 2
bindd = SUPER, KP_Next,   Switch to workspace 3 (numpad),  workspace, 3
bindd = SUPER, KP_Left,   Switch to workspace 4 (numpad),  workspace, 4
bindd = SUPER, KP_Begin,  Switch to workspace 5 (numpad),  workspace, 5
bindd = SUPER, KP_Right,  Switch to workspace 6 (numpad),  workspace, 6
bindd = SUPER, KP_Home,   Switch to workspace 7 (numpad),  workspace, 7
bindd = SUPER, KP_Up,     Switch to workspace 8 (numpad),  workspace, 8
bindd = SUPER, KP_Prior,  Switch to workspace 9 (numpad),  workspace, 9
bindd = SUPER, KP_Insert, Switch to workspace 10 (numpad), workspace, 10

# Gap bar toggle
bindd = CTRL ALT, B, Toggle gap bar on S24F350, exec, toggle-gap-bar
