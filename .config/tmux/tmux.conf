# Rebind Prefix Key from CTRL + B to CTRL + Space
# unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# Intuitive bindings for splits (leader+h/v)
bind h split-window -v -c "#{pane_current_path}"  # Prefix + h (split horizontal)
bind v split-window -h -c "#{pane_current_path}"  # Prefix + v (split vertical)

# Close pane/window/session easily (without confirmation)
bind x kill-pane    # Prefix + x (close current pane, no confirmation)
bind X kill-window  # Prefix + Shift+X (close current window, no confirmation)
bind e kill-session # Prefix + e (close current session, no confirmation)

# Navigate between panes with Ctrl+hjkl (handled by vim-tmux-navigator plugin)
# Version for Vim that's inside the pane
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
  "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
  "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Navigate between tabs/windows with Ctrl+Alt+H/L
bind -n C-M-h previous-window
bind -n C-M-l next-window

# Resize panes with prefix + Shift + hjkl
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Habilitar soporte para mouse (scrolling, selección de paneles, resize)
set -g mouse on

# Aumentar el historial de líneas (por defecto es 2000)
set -g history-limit 10000

# Renumber all windows when any window is closed
set -g renumber-windows on

# Options to make tmux more pleasant
set -g default-terminal "tmux-256color"

# Use zsh as default shell
set -g default-shell /usr/bin/zsh
set -g default-command /usr/bin/zsh

# Activar automatic-rename para que use el nombre de la app cuando no hay nombre manual
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_command}'
setw -g allow-rename off  # Evitar que aplicaciones cambien el nombre

# Renumerar ventanas automáticamente cuando se cierra una
set -g renumber-windows on

# Vi mode for copy mode
setw -g mode-keys vi

# Enter copy mode with Ctrl+Space + [
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle

# Copy to system clipboard (Wayland - requires wl-clipboard)
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha" # latte, frappe, macchiato, or mocha
set -g @catppuccin_window_status_style "rounded" # basic, rounded, slanted, custom, or none

# Always show window name (custom names set with Prefix+,)
set -g @catppuccin_window_text " #{window_name}"
set -g @catppuccin_window_current_text " #{window_name}"

# Load plugins with TPM
# Note: plugins are not tracked in .dots — they are installed by TPM.
# On a new machine: clone this repo, then press prefix + I inside tmux to install all plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# tmux-resurrect settings
# Save: Prefix + Ctrl-s
# Restore: Prefix + Ctrl-r
set -g @resurrect-capture-pane-contents 'on'  # Guardar contenido de los panes
set -g @resurrect-strategy-nvim 'session'     # Restaurar sesiones de nvim

# Customize catppuccin modules (MUST be before loading catppuccin)
set -g @catppuccin_session_text " #S [#{session_id}/#(tmux list-sessions | wc -l)]"

# Load catppuccin theme
run ~/.config/tmux/plugins/tmux/catppuccin.tmux

# Configure status line layout (after catppuccin is loaded)
set -g status-left-length 100
set -g status-right-length 100
set -g status-justify left

# Left: Let catppuccin handle window list (tabs will accumulate normally)
set -g status-left ""

# Right: Session only
set -g status-right "#{E:@catppuccin_status_session}"

# Add padding/spacing to status bar with transparent gap (MUST be after catppuccin loads)
set -g status-position top
set -g pane-border-status off
set -g status 2
set -g status-format[1] "#[bg=#1e1e2e]"
set -gF status-style "bg=#1e1e2e"

set -g allow-passthrough on

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

