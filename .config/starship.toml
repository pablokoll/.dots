add_newline = true
command_timeout = 200
format = "[$directory$git_branch$git_status]($style)$status${env_var.VI_MODE_INSERT}${env_var.VI_MODE_NORMAL} $character"

[character]
error_symbol = "[✗](bold cyan)"
success_symbol = "[❯](bold cyan)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
repo_root_style = "bold cyan"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$branch]($style) "
style = "italic cyan"

[git_status]
format     = '[$all_status]($style)'
style      = "cyan"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""

[status]
disabled = false
format = '[\[$status\]]($style) '
style = "bold red"

[env_var.VI_MODE_INSERT]
variable = "VI_MODE_INSERT"
format = "[$env_value]($style)"
style = "bold green"

[env_var.VI_MODE_NORMAL]
variable = "VI_MODE_NORMAL"
format = "[$env_value]($style)"
style = "bold blue"
